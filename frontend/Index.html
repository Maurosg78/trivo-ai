<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Search</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Search for Product Nutrition</h1>
        <form id="nutrition-form">
            <label for="search-input">Enter Barcode or Product Name:</label>
            <input type="text" id="search-input" placeholder="E.g., 6001306015501 or Corn Flakes" required>
            <button type="submit">Search</button>
        </form>
        <div id="result-container"></div>
    </div>
    <script src="./js/app.js" defer></script>
</body>
</html>
